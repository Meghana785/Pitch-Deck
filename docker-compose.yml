# Docker Compose for PitchReady (FastAPI Backend + LangGraph Worker + Nginx)
services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    env_file: .env
    ports:
      - '8000:8000'

  worker:
    build:
      context: ./worker
    env_file: .env
    restart: unless-stopped
